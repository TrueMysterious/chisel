# test this file with
#   goreleaser release --config goreleaser.yml --clean --snapshot
version: 2
builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/jpillora/chisel/share.BuildVersion={{.Version}}
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
      - openbsd
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
      - ppc64
      - ppc64le
      - mips
      - mipsle
      - mips64
      - mips64le
      - s390x
    goarm:
      - "5"
      - "6"
      - "7"
    gomips:
      - hardfloat
      - softfloat
    ignore:
      # https://github.com/golang/go/issues/70705
      - goos: windows
        goarch: arm
nfpms:
  - maintainer: "https://github.com/jpillora"
    formats:
      - deb
      - rpm
      - apk
archives:
  - formats:
      - gz
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - none*
release:
  draft: true
  replace_existing_draft: true
  prerelease: auto
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - image_templates:
      - "ghcr.io/jpillora/chisel:{{ .Version }}-amd64"
      - "docker.io/jpillora/chisel:{{ .Version }}-amd64"
    use: buildx
    dockerfile: .github/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64

  - image_templates:
      - "ghcr.io/jpillora/chisel:{{ .Version }}-arm64"
      - "docker.io/jpillora/chisel:{{ .Version }}-arm64"
    use: buildx
    dockerfile: .github/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

  - image_templates:
      - "ghcr.io/jpillora/chisel:{{ .Version }}-armv7"
      - "docker.io/jpillora/chisel:{{ .Version }}-armv7"
    use: buildx
    dockerfile: .github/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm/v7"
    goarch: arm
    goarm: "7"

  - image_templates:
      - "ghcr.io/jpillora/chisel:{{ .Version }}-armv6"
      - "docker.io/jpillora/chisel:{{ .Version }}-armv6"
    use: buildx
    dockerfile: .github/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm/v6"
    goarch: arm
    goarm: "6"

  - image_templates:
      - "ghcr.io/jpillora/chisel:{{ .Version }}-386"
      - "docker.io/jpillora/chisel:{{ .Version }}-386"
    use: buildx
    dockerfile: .github/Dockerfile
    build_flag_templates:
      - "--platform=linux/386"
    goarch: "386"

  - image_templates:
      - "ghcr.io/jpillora/chisel:{{ .Version }}-ppc64le"
      - "docker.io/jpillora/chisel:{{ .Version }}-ppc64le"
    use: buildx
    dockerfile: .github/Dockerfile
    build_flag_templates:
      - "--platform=linux/ppc64le"
    goarch: ppc64le

# version manifests only — floating tags (latest / X / X.Y) are promoted
# by .github/workflows/promote.yml when the draft GitHub release is
# published (release stage 2)
docker_manifests:
  - name_template: "ghcr.io/jpillora/chisel:{{ .Version }}"
    image_templates:
      - "ghcr.io/jpillora/chisel:{{ .Version }}-amd64"
      - "ghcr.io/jpillora/chisel:{{ .Version }}-arm64"
      - "ghcr.io/jpillora/chisel:{{ .Version }}-armv7"
      - "ghcr.io/jpillora/chisel:{{ .Version }}-armv6"
      - "ghcr.io/jpillora/chisel:{{ .Version }}-386"
      - "ghcr.io/jpillora/chisel:{{ .Version }}-ppc64le"

  - name_template: "docker.io/jpillora/chisel:{{ .Version }}"
    image_templates:
      - "docker.io/jpillora/chisel:{{ .Version }}-amd64"
      - "docker.io/jpillora/chisel:{{ .Version }}-arm64"
      - "docker.io/jpillora/chisel:{{ .Version }}-armv7"
      - "docker.io/jpillora/chisel:{{ .Version }}-armv6"
      - "docker.io/jpillora/chisel:{{ .Version }}-386"
      - "docker.io/jpillora/chisel:{{ .Version }}-ppc64le"
